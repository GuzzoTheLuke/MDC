
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calcolatore Dose MdC in TC</title>
    <!-- Caricamento di Tailwind CSS per uno styling rapido e responsive --><script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Stile personalizzato generale per Light Mode */
        * {
            box-sizing: border-box; /* FIX: Garantisce una corretta gestione delle dimensioni su Safari/WebKit */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb; /* Grigio molto chiaro */
            color: #1f2937; /* Testo scuro */
        }
        /* Definizioni per shadow personalizzata (più sottile per light mode) */
        .shadow-3xl {
            box-shadow: 0 15px 20px -5px rgba(0, 0, 0, 0.05), 0 5px 10px -5px rgba(0, 0, 0, 0.02), 0 0 30px rgba(0, 0, 0, 0.05);
        }
        /* Stile per l'input range (slider) */
        input[type=range] {
            cursor: pointer; /* FIX: Rende il cursore esplicito anche su Safari */
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #4f46e5; /* Indaco (Default) */
            cursor: pointer;
            margin-top: -8px; /* Offset per centrare verticalmente */
            box-shadow: 0 0 0 4px #c7d2fe; 
            transition: all 0.15s ease-in-out;
        }
        input[type=range]:hover::-webkit-slider-thumb {
            background: #4338ca; 
        }
        input[type=range]::-moz-range-thumb {
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #4f46e5;
            cursor: pointer;
            box-shadow: 0 0 0 4px #c7d2fe;
            transition: all 0.15s ease-in-out;
        }
         input[type=range]:hover::-moz-range-thumb {
            background: #4338ca; 
        }
        
        /* Correzione cruciale per forzare il centramento del pollice sui bordi del track */
        input[type=range] {
            /* Padding orizzontale compensativo per far partire il pollice esattamente al bordo */
            padding-left: 10px; 
            padding-right: 10px; 
            /* Rende l'elemento responsive ma con offset correttivo */
            width: calc(100% - 20px); 
            margin-left: 10px;
            margin-right: 10px;
        }

        /* Correzione per il div Min/Max per allineare le etichette al pollice */
        #min-max-labels {
            margin-top: 1rem; /* Spazio verticale */
            padding-left: 10px; /* Allineamento al bordo del track compensato */
            padding-right: 10px;
            width: 100%;
        }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center items-center min-h-screen">

    <div id="app-container" class="bg-white p-6 md:p-10 rounded-3xl shadow-3xl w-full max-w-lg transition-all duration-300">
        <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800 mb-2 text-center whitespace-nowrap">
            Calcolatore Dose MdC in TC
        </h1>
        <p class="text-sm text-gray-500 mb-8 text-center">
            Dosaggio Iodio | Formula di Boer (LBW)
        </p>

        <!-- Sezione Input Paziente (Card 1) --><div id="datiPazienteCard" class="space-y-6 mb-8 p-6 border-t-4 border-indigo-600 rounded-2xl bg-gray-50 shadow-lg transition-colors duration-300">
            <h2 class="text-xl font-bold text-indigo-700 border-b border-gray-200 pb-3" id="datiPazienteTitle">Dati Paziente</h2>
            
            <!-- Sesso: GRUPPO DI PULSANTI SEGMENTATI --><div class="flex flex-col sm:flex-row sm:items-center space-y-3 sm:space-y-0 sm:space-x-12">
                <span class="text-gray-700 font-medium whitespace-nowrap">Sesso:</span>
                <div class="flex space-x-2 p-1 bg-white rounded-xl border border-gray-300 shadow-md w-full sm:w-auto">
                    
                    <!-- Uomo Button (Label) --><label for="radio-uomo" 
                           class="flex-1 text-center py-2 px-6 rounded-lg font-semibold cursor-pointer transition duration-200 ease-in-out text-gray-700 hover:bg-gray-100 ring-4 ring-transparent" 
                           id="label-uomo">
                        Uomo
                    </label>
                    
                    <!-- Donna Button (Label) --><label for="radio-donna" 
                           class="flex-1 text-center py-2 px-6 rounded-lg font-semibold cursor-pointer transition duration-200 ease-in-out text-gray-700 hover:bg-gray-100 ring-4 ring-transparent" 
                           id="label-donna">
                        Donna
                    </label>
                </div>
                
                <!-- Input Radio Nascosti --><input type="radio" name="gender" value="U" checked id="radio-uomo" class="hidden">
                <input type="radio" name="gender" value="D" id="radio-donna" class="hidden">
            </div>

            <!-- Peso e Altezza --><div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div>
                    <label for="peso" class="block text-sm font-semibold text-gray-600 mb-1">Peso (kg)</label>
                    <input type="number" id="peso" placeholder="75"
                           class="mt-1 block w-full rounded-xl border-gray-300 shadow-sm p-3 border bg-white focus:border-indigo-500 focus:ring-indigo-500 hover:border-indigo-400 transition duration-150 text-gray-800" required>
                </div>
                <div>
                    <label for="altezza" class="block text-sm font-semibold text-gray-600 mb-1">Altezza (cm)</label>
                    <input type="number" id="altezza" placeholder="180"
                           class="mt-1 block w-full rounded-xl border-gray-300 shadow-sm p-3 border bg-white focus:border-indigo-500 focus:ring-indigo-500 hover:border-indigo-400 transition duration-150 text-gray-800" required>
                   
                 </div>

            </div>
             <br>
                    <label for="doseTarget" class="block text-sm font-semibold text-gray-700 mb-3">
                    BMI:  <span id="calcolaBMI" class="font-bold text-indigo-600">--</span>
                    </label>
        
                     <label for="doseTarget" class="block text-sm font-semibold text-gray-700 mb-3">
                    Il paziente è: 
                    </label>
        </div>
         

        <!-- Sezione Protocollo MDC (Card 2) --><div class="space-y-6 mb-8 p-6 border-t-4 border-teal-600 rounded-2xl bg-gray-50 shadow-lg">
            <h2 class="text-xl font-bold text-teal-700 border-b border-gray-200 pb-3">Protocollo MdC</h2>
            
            <!-- Dose Target di Iodio (mgI/kg LBW) - SLIDER FIX --><div>
                <label for="doseTarget" class="block text-sm font-semibold text-gray-700 mb-3">
                    Dose Target Iodio (mgI/kg LBW): <br>
                </label>
                
                 <label for="doseTarget" class="block text-sm text-gray-700 mb-3">
                    Paziente normopeso: 700 mgl/kg LBW <br>
                    Paziente obeso: 600 mgl/kg LBW <br>
                </label>
                
                <!-- Display del valore centrato sopra lo slider --><div class="text-center mb-4">
                     <span id="doseTargetValue" class="font-black text-4xl text-indigo-600">750</span>
                     <span class="text-lg font-medium text-gray-600 whitespace-nowrap">mgI/kg LBW</span>
                </div>
                
                <!-- Slider con classi CSS modificate --><input type="range" id="doseTarget" min="600" max="750" step="50" value="700"
                       class="h-2 bg-gray-300 rounded-full appearance-none cursor-pointer focus:outline-none" required>
                
                <!-- Etichette Min/Max con correzione all'offset del padding/margine --><div id="min-max-labels" class="flex justify-between text-xs text-gray-500">
                    <span class="font-medium">600</span>
                    <span class="font-medium">750</span>
                </div>
            </div>

            <!-- Concentrazione del MDC (mgI/ml) --><div>
                <label for="concentrazione" class="block text-sm font-semibold text-gray-700 mb-1">
                    Concentrazione MdC (mgI/ml):
                </label>
                
                 <label for="doseTarget" class="block text-sm text-gray-700 mb-3">
                    IOPAMIRO 370 -> TC 1 e TC 2 <br>
                    OMNIPAQUE 350 -> TC PS <br>
                </label>
                
                <select id="concentrazione" class="mt-1 block w-full rounded-xl border-gray-300 shadow-sm p-3 border bg-white focus:border-teal-500 focus:ring-teal-500 hover:border-teal-400 transition duration-150 text-gray-800" required>
                    <option value="400">400 mgI/ml</option>
                    <option value="370" selected>370 mgI/ml</option>
                    <option value="350">350 mgI/ml</option>
                    <option value="320">320 mgI/ml</option>
                    <option value="300">300 mgI/ml</option>
                    <option value="270">270 mgI/ml</option>
                </select>
            </div>
        </div>

        <!-- Pulsante di Calcolo --><button id="calcolaBtn"
                class="w-full py-4 px-4 border border-transparent rounded-2xl shadow-xl text-white bg-indigo-600 hover:bg-indigo-700 transition duration-200 ease-in-out font-bold text-xl focus:outline-none focus:ring-4 focus:ring-indigo-300 active:bg-indigo-800">
            CALCOLA
        </button> <br>
        <br>
        <label class="block text-xs text-gray-700 tsxt-center"> 
            Adattato e modificato da Luca Guzzetti <br>
            Sviluppato da Roldo F., Gigantelli I. e BH <br>
        
        </label>

        <!-- Messaggio di Errore --><div id="errore-msg" class="mt-6 p-4 bg-red-100 border-l-4 border-red-600 text-red-800 rounded-lg hidden font-medium">
            <!-- Il contenuto dell'errore è inserito dinamicamente --></div>

        <!-- Sezione Risultati (Risultato Card High-Impact) --><div id="risultati-container" class="mt-8 space-y-4 p-6 rounded-2xl bg-white shadow-xl hidden border-2 border-gray-200">
            <h2 class="text-xl font-bold text-gray-800 border-b border-gray-200 pb-3 mb-4">Riepilogo Calcoli</h2>
            
            <div class="flex justify-between items-center py-2 border-b border-gray-200">
                <span class="text-gray-600 font-semibold">Massa Magra stimata (LBW):</span>
                <span id="risultato-lbw" class="text-xl font-extrabold text-indigo-600"></span>
            </div>
            
            <div class="flex justify-between items-center py-2 border-b border-gray-200">
                <span class="text-gray-600 font-semibold">Massa Iodio Totale richiesta:</span>
                <span id="risultato-massa-iodio" class="text-xl font-extrabold text-teal-600"></span>
            </div>

            <!-- Risultato Critico: Volume MdC (Centrato e Ridotto per Armonia) --><div id="risultatoVolumeCard" class="flex justify-center items-center py-5 px-6 rounded-xl flex-nowrap border-2 transition-colors duration-300 gap-x-4">
                <span class="text-lg font-extrabold whitespace-nowrap transition-colors duration-300">Volume MdC:</span>
                <span id="risultato-volume" class="text-2xl font-black whitespace-nowrap transition-colors duration-300"></span>
            </div>
        </div>
    </div>

    <script>
        // Funzioni di calcolo in JavaScript

        function calcolaLBWBoer(sesso, peso, altezza) {
            const P = parseFloat(peso);
            const H = parseFloat(altezza);

            if (isNaN(P) || isNaN(H) || P <= 0 || H <= 0) {
                return null;
            }

            // Formula di Boer
            if (sesso === 'U') {
                // Uomini: LBW = 0.407 * P + 0.267 * H - 19.2
                return 0.407 * P + 0.267 * H - 19.2;
            } else if (sesso === 'D') {
                // Donne: LBW = 0.252 * P + 0.473 * H - 48.3
                return 0.252 * P + 0.473 * H - 48.3;
            }
            return null;
        }

        function calcolaVolumeMDC(lbw, doseTargetIodio, concentrazioneMDC) {
            // Massa Totale di Iodio (mg) = LBW * Dose Target
            const massaIodio = lbw * doseTargetIodio;
            
            // Volume Finale (ml) = Massa Totale di Iodio / Concentrazione
            const volumeMDC = massaIodio / concentrazioneMDC;
            
            return { volume: volumeMDC, massaIodio: massaIodio };
        }

     function calcolaBMI(peso, altezza) {
    const P = parseFloat(peso);
    const H = parseFloat(altezza) / 100; // cm → metri

    if (isNaN(P) || isNaN(H) || H <= 0) return null;

    return P / (H * H);
}

        function aggiornaBMI() {
    const peso = document.getElementById('peso').value.trim();
    const altezza = document.getElementById('altezza').value.trim();

  
            
    const bmi = calcolaBMI(peso, altezza);

    const bmiDisplay = document.getElementById('bmi-value');

    if (bmi !== null && isFinite(bmi)) {
        bmiDisplay.textContent = bmi.toFixed(1);
    } else {
        bmiDisplay.textContent = '--';
    }
}
        
        // Riferimenti agli elementi chiave
        const doseTargetSlider = document.getElementById('doseTarget');
        const doseTargetValueDisplay = document.getElementById('doseTargetValue');
        
        const radioUomo = document.getElementById('radio-uomo');
        const radioDonna = document.getElementById('radio-donna');
        const labelUomo = document.getElementById('label-uomo');
        const labelDonna = document.getElementById('label-donna');
        
        // Elementi per il cambio di tema
        const datiPazienteCard = document.getElementById('datiPazienteCard');
        const datiPazienteTitle = document.getElementById('datiPazienteTitle');
        const risultatoLbw = document.getElementById('risultato-lbw');
        const pesoInput = document.getElementById('peso');
        const altezzaInput = document.getElementById('altezza');
        const calcolaBtn = document.getElementById('calcolaBtn');
        const risultatoVolumeCard = document.getElementById('risultatoVolumeCard');
        const risultatoVolume = document.getElementById('risultato-volume');

        // === Nuovi Codici Colore Dinamici ===
        
        // Colori per i pulsanti Sesso
        const coloreUomo = '#D6EEFF'; // Azzurro Cielo Molto Chiaro
        const coloreDonna = '#E6E6FA'; // Lavanda tenue (Lavender)
        
        // Colori per il riquadro risultati (Volume MDC) - Scelti per essere professionali ma distintivi
        const coloreRisultatoUomo = {
            bg: '#E0F2FF',      // Light Blue 100
            border: '#2563EB',  // Blue 600
            text: '#1D4ED8'     // Blue 700 (per il testo in grassetto)
        };
        const coloreRisultatoDonna = {
            bg: '#F3E8FF',      // Light Violet 100
            border: '#9333EA',  // Violet 600
            text: '#7E22CE'     // Violet 700 (per il testo in grassetto)
        };
        // === Fine Codici Colore Dinamici ===


        // Funzione per eseguire il ricalcolo se i risultati sono visibili
        function autoRecalculateIfPossible() {
            const pesoValue = document.getElementById('peso').value.trim(); // Usa trim() per gestire gli spazi
            const altezzaValue = document.getElementById('altezza').value.trim(); // Usa trim()
            
            // Controllo se i campi non sono vuoti E sono numerici
            const pesoValid = pesoValue && !isNaN(parseFloat(pesoValue));
            const altezzaValid = altezzaValue && !isNaN(parseFloat(altezzaValue));

            if (pesoValid && altezzaValid) {
                // Forziamo il click solo se i dati sono presenti e validi per un calcolo
                document.getElementById('calcolaBtn').click();
            } else if (!risultatiContainer.classList.contains('hidden')) {
                // Se i risultati erano visibili ma i campi non sono più validi, nascondi il riquadro.
                risultatiContainer.classList.add('hidden');
                document.getElementById('errore-msg').classList.add('hidden');
            }
        }

        function updateGenderVisuals() {
            
            let selectedLabel, selectedColor;
            let resultColors; // Oggetto per i colori del risultato
            
            // Pulizia di tutti gli highlight precedenti (pulsanti)
            labelUomo.removeAttribute('style');
            labelDonna.removeAttribute('style');
            labelUomo.classList.remove('text-gray-800', 'text-white', 'shadow-md');
            labelDonna.classList.remove('text-gray-800', 'text-white', 'shadow-md');
            labelUomo.classList.add('text-gray-700', 'hover:bg-gray-100');
            labelDonna.classList.add('text-gray-700', 'hover:bg-gray-100');
            
            if (radioUomo.checked) {
                selectedLabel = labelUomo;
                selectedColor = coloreUomo;
                resultColors = coloreRisultatoUomo;
            } else if (radioDonna.checked) {
                selectedLabel = labelDonna;
                selectedColor = coloreDonna;
                resultColors = coloreRisultatoDonna;
            } else {
                 // Fallback neutrale (se non è selezionato nulla, anche se il default è Uomo)
                 resultColors = { bg: '#E0E7FF', border: '#4F46E5', text: '#3730A3' };
            }

            if (selectedLabel) {
                // Applica lo stile personalizzato al pulsante Sesso (come prima)
                selectedLabel.style.backgroundColor = selectedColor;
                const darkerColor = selectedColor + '50';
                selectedLabel.style.boxShadow = `0 0 0 2px ${selectedColor}, 0 0 0 4px ${darkerColor}`; 
                selectedLabel.classList.add('text-gray-800');
                selectedLabel.classList.remove('hover:bg-gray-100', 'text-gray-700'); 
            }
            
            // 2. Applicazione dello stile personalizzato al riquadro risultati critico (Volume MDC)
            if (risultatoVolumeCard) {
                // Applica i nuovi stili dinamici al contenitore del risultato critico
                risultatoVolumeCard.style.backgroundColor = resultColors.bg;
                risultatoVolumeCard.style.borderColor = resultColors.border;
                
                // Aggiorna il colore del testo del volume
                risultatoVolume.style.color = resultColors.text;
                
                // Aggiorna il colore del testo della label "Volume MDC:"
                const volumeLabel = risultatoVolumeCard.querySelector('.text-lg');
                if (volumeLabel) {
                    volumeLabel.style.color = resultColors.text;
                }
            }
        }
        
        // Listener per aggiornare lo stile dei pulsanti E dei risultati in tempo reale
        // Aggiunge la funzione di ricalcolo automatico, fixando il bug del colore/valore non sincronizzato.
        radioUomo.addEventListener('change', () => { updateGenderVisuals(); autoRecalculateIfPossible(); });
        radioDonna.addEventListener('change', () => { updateGenderVisuals(); autoRecalculateIfPossible(); });
        
      /*  // Listener per input di Peso e Altezza: ricalcola se la condizione di validità è soddisfatta
        pesoInput.addEventListener('input', autoRecalculateIfPossible);
        altezzaInput.addEventListener('input', autoRecalculateIfPossible);
        pesoInput.addEventListener('input', aggiornaBMI);
        altezzaInput.addEventListener('input', aggiornaBMI);*/

        pesoInput.addEventListener('input', () => {
    aggiornaBMI();
    autoRecalculateIfPossible();
});

altezzaInput.addEventListener('input', () => {
    aggiornaBMI();
    autoRecalculateIfPossible();
});


        // Imposta il valore iniziale dello slider e dei pulsanti sesso
        doseTargetValueDisplay.textContent = doseTargetSlider.value;
        updateGenderVisuals(); // Esegui all'avvio per impostare lo stile iniziale (Uomo)
        
        // Listener per aggiornare il valore visualizzato quando lo slider viene mosso
        doseTargetSlider.addEventListener('input', () => {
            doseTargetValueDisplay.textContent = doseTargetSlider.value;
            // Ricalcola anche quando lo slider è mosso se i risultati sono visibili
            autoRecalculateIfPossible();
        });


        document.getElementById('calcolaBtn').addEventListener('click', () => {
            // 1. Recupero Input
            const sesso = document.querySelector('input[name="gender"]:checked').value;
            const peso = document.getElementById('peso').value;
            const altezza = document.getElementById('altezza').value;
            
            const doseTarget = parseFloat(doseTargetSlider.value);
            const concentrazione = parseFloat(document.getElementById('concentrazione').value);

            const risultatiContainer = document.getElementById('risultati-container');
            const erroreMsg = document.getElementById('errore-msg');
            
            // Nascondi risultati ed errori precedenti
            risultatiContainer.classList.add('hidden');
            erroreMsg.classList.add('hidden');
            
            // AGGIORNA I COLORI DEL RISULTATO PRIMA DI CALCOLARE (per assicurare la coerenza)
            updateGenderVisuals();

            // Controllo Input Base
            if (isNaN(doseTarget) || doseTarget <= 0 || isNaN(concentrazione) || concentrazione <= 0) {
                 erroreMsg.innerHTML = "Per favore, Dose Target e Concentrazione MdC devono essere valide (> 0).";
                 erroreMsg.classList.remove('hidden');
                 return;
            }

            // 2. Calcolo LBW
            const lbw = calcolaLBWBoer(sesso, peso, altezza);

            if (lbw === null || lbw <= 0) {
                // Se la LBW è 0 o non valida, mostra errore (es. input non numerici o < 0)
                erroreMsg.innerHTML = "Per favore, inserisci valori numerici validi (Peso e Altezza > 0).";
                erroreMsg.classList.remove('hidden');
                return;
            }

            // 3. Calcolo Volume MDC (Risultato in mg)
            const { volume, massaIodio } = calcolaVolumeMDC(lbw, doseTarget, concentrazione);

            //4. Calcolo BMI
            
            
            // Conversione da mg a grammi (g) per la visualizzazione
            const massaIodioGrammi = massaIodio / 1000;

            // 5. Visualizzazione Risultati
            document.getElementById('risultato-lbw').textContent = `${lbw.toFixed(1)} kg`; 
            document.getElementById('risultato-massa-iodio').textContent = `${massaIodioGrammi.toFixed(1)} gI`; 
            document.getElementById('risultato-volume').textContent = `${volume.toFixed(1)} ml`;
            
            risultatiContainer.classList.remove('hidden');
        });
    </script>
</body>
</html>
